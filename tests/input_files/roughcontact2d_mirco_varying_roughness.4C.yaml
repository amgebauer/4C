TITLE:
  - "Simulation of multi-scale contact of two blocks using MIRCO."
  - "At every mortar node, a BEM problem is solved using MIRCO to"
  - "get the pressure response for the provided gap."
PROBLEM SIZE:
  DIM: 2
PROBLEM TYPE:
  PROBLEMTYPE: "Structure"
DISCRETISATION:
  NUMFLUIDDIS: 0
  NUMALEDIS: 0
  NUMTHERMDIS: 0
IO:
  STRUCT_STRESS: "2PK"
STRUCTURAL DYNAMIC:
  DYNAMICTYPE: "Statics"
  TIMESTEP: 1
  NUMSTEP: 1
  MAXTIME: 1
  LINEAR_SOLVER: 1
STRUCT NOX/Status Test:
  XML File: "rough_contact_solver.xml"
CONTACT DYNAMIC:
  LINEAR_SOLVER: 1
  STRATEGY: "MultiScale"
MORTAR COUPLING:
  LM_SHAPEFCN: "Standard"
  SEARCH_ALGORITHM: "BruteForce"
  LM_DUAL_CONSISTENT: "none"
SOLVER 1:
  SOLVER: "UMFPACK"
  NAME: "Structure_Solver"
IO/RUNTIME VTK OUTPUT:
  INTERVAL_STEPS: 1
IO/RUNTIME VTK OUTPUT/STRUCTURE:
  OUTPUT_STRUCTURE: true
  DISPLACEMENT: true
  ELEMENT_OWNER: true
  ELEMENT_GID: true
  STRESS_STRAIN: true
FUNCT1:
  - COMPONENT: 0
    SYMBOLIC_FUNCTION_OF_SPACE_TIME: "a"
  - VARIABLE: 0
    NAME: "a"
    TYPE: "linearinterpolation"
    NUMPOINTS: 2
    TIMES: [0, 1]
    VALUES: [0, -10]
FUNCT2:
  - COMPONENT: 0
    SYMBOLIC_FUNCTION_OF_SPACE_TIME: "x/20000+0.5"
FUNCT3:
  - COMPONENT: 0
    SYMBOLIC_FUNCTION_OF_SPACE_TIME: "30-x/2000"
MATERIALS:
  - MAT: 1
    MAT_Struct_StVenantKirchhoff:
      YOUNG: 1
      NUE: 0.3
      DENS: 1
  - MAT: 2
    MAT_Struct_StVenantKirchhoff:
      YOUNG: 1
      NUE: 0.3
      DENS: 1
CONTACT CONSTITUTIVE LAWS:
  - LAW: 1
    CoConstLaw_mirco:
      FirstMatID: 1
      SecondMatID: 2
      LateralLength: 1000
      Resolution: 6
      PressureGreenFunFlag: true
      InitialTopologyStdDeviationFunct: 3
      HurstExponentFunct: 2
      RandomGeneratorSeed: 71
      MaxIteration: 100
