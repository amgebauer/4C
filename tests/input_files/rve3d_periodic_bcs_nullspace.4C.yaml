TITLE:
  - "Test periodic boundary conditions for a 3D RVE with nullspace projection"
  - "Verify rigid-body mode removal through Krylov projection with nullspace vectors"
PROBLEM TYPE:
  PROBLEMTYPE: "Structure"
CONSTRAINT:
  CONSTRAINT_ENFORCEMENT: "penalty"
  PENALTY_PARAM: 10000000.0
IO:
  VERBOSITY: "Standard"
  STRUCT_STRAIN: "GL"
  STRUCT_STRESS: "Cauchy"
SOLVER 1:
  SOLVER: "UMFPACK"
  NAME: "Structure_Solver"
STRUCTURAL DYNAMIC:
  INT_STRATEGY: "Standard"
  DYNAMICTYPE: "Statics"
  TIMESTEP: 0.5
  NUMSTEP: 2
  MAXTIME: 1
  TOLDISP: 0.0001
  TOLRES: 0.0001
  LINEAR_SOLVER: 1
MATERIALS:
  - MAT: 2
    MAT_Struct_StVenantKirchhoff:
      YOUNG: 10
      NUE: 0.0
      DENS: 1
  - MAT: 1
    MAT_Struct_StVenantKirchhoff:
      YOUNG: 1e-07
      NUE: 0.0
      DENS: 1
DESIGN POINT DIRICH CONDITIONS:
  - NUMDOF: 3
    ONOFF: [1, 1, 1]
    VAL: [1.0, 1.0, 1.0]
    FUNCT: [1, 2, 3]
    E: 1
  - NUMDOF: 3
    ONOFF: [1, 1, 1]
    VAL: [1.0, 1.0, 1.0]
    FUNCT: [1, 2, 3]
    E: 2
  - NUMDOF: 3
    ONOFF: [1, 1, 1]
    VAL: [1.0, 1.0, 1.0]
    FUNCT: [1, 2, 3]
    E: 3
  - NUMDOF: 3
    ONOFF: [1, 1, 1]
    VAL: [1.0, 1.0, 1.0]
    FUNCT: [1, 2, 3]
    E: 4
DESIGN SURF PERIODIC RVE 3D BOUNDARY CONDITIONS:
  - SURF: "x-"
    E: 1
  - SURF: "x+"
    E: 2
  - SURF: "y-"
    E: 3
  - SURF: "y+"
    E: 4
  - SURF: "z-"
    E: 5
  - SURF: "z+"
    E: 6
DESIGN VOL MODE FOR KRYLOV SPACE PROJECTION:
  - DIS: "structure"
    NUMMODES: 6
    ONOFF: [1, 1, 1, 1, 1, 1]
    WEIGHTVECDEF: "pointvalues"
    TYPE: "projection"
    E: 1
FUNCT1:
  - SYMBOLIC_FUNCTION_OF_SPACE_TIME: "1*(Faa+beta*(1-Faa)-1)*x+(Fab-beta*Fab)*y+(Fac-beta*Fac)*z"
  - VARIABLE: 0
    NAME: "Faa"
    TYPE: "expression"
    DESCRIPTION: "0.95"
  - VARIABLE: 1
    NAME: "Fab"
    TYPE: "expression"
    DESCRIPTION: "0.0"
  - VARIABLE: 2
    NAME: "Fac"
    TYPE: "expression"
    DESCRIPTION: "0.0"
  - VARIABLE: 9
    NAME: "beta"
    TYPE: "expression"
    DESCRIPTION: "1*(1-t)/1"
FUNCT2:
  - SYMBOLIC_FUNCTION_OF_SPACE_TIME: "(Fba-beta*Fba)*x+(Fbb+beta*(1-Fbb)-1)*y+(Fbc-beta*Fbc)*z"
  - VARIABLE: 3
    NAME: "Fba"
    TYPE: "expression"
    DESCRIPTION: "0.0"
  - VARIABLE: 4
    NAME: "Fbb"
    TYPE: "expression"
    DESCRIPTION: "1.0"
  - VARIABLE: 5
    NAME: "Fbc"
    TYPE: "expression"
    DESCRIPTION: "0.0"
  - VARIABLE: 9
    NAME: "beta"
    TYPE: "expression"
    DESCRIPTION: "1*(1-t)/1"
FUNCT3:
  - SYMBOLIC_FUNCTION_OF_SPACE_TIME: "(Fca-beta*Fca)*x+(Fcb-beta*Fcb)*y+(Fcc+beta*(1-Fcc)-1)*z"
  - VARIABLE: 6
    NAME: "Fca"
    TYPE: "expression"
    DESCRIPTION: "0.0"
  - VARIABLE: 7
    NAME: "Fcb"
    TYPE: "expression"
    DESCRIPTION: "0.0"
  - VARIABLE: 8
    NAME: "Fcc"
    TYPE: "expression"
    DESCRIPTION: "1.0"
  - VARIABLE: 9
    NAME: "beta"
    TYPE: "expression"
    DESCRIPTION: "1*(1-t)/1"
